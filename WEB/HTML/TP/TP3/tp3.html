<meta charset="utf-8" />

<form>
    <fieldset>
        <legend>Informations personnelles</legend>
        <table>
            <tr><td>Email</td><td> <input type="email" placeholder="lorem@mail.fr" value="" name="login" ></td></tr>
            <tr><td>Mot de pass</td><td> <input type="password" placeholder="********" value="" name="login" ></td></tr>
            <tr><td>Genre</td><td>
                <select name="genre">
                    <option value="">--Genre--</option>
                    <option value="">Femme</option>

                </select></td></tr>
            <tr><td>Date de naissance</td><td> <input type="date" value="2000-01-01" name="birthdate" ></td></tr>

    <fieldset>
        <legend>Préférences</legend>

            <tr><td>Centres d'intérêts</td><td> <input name="favColor" type="checkbox">Sport <input name="favColor" type="checkbox">Danse <input name="favColor" type="checkbox">Musique <input name="favColor" type="checkbox">Informatique </td></tr>
        </table>
    </fieldset>
    
    <fieldset>
        <legend>Commentaires</legend>
        <table>
            <tr><td>Message</td><td> <textarea rows="4" cols="20" name="commentaire"> </textarea> </td></tr>
        </table>
    </fieldset>

    <input type="submit" value="Envoyer">
</form>
