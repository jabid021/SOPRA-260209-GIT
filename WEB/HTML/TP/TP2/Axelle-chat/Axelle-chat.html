<!DOCTYPE html>

<head>
  <meta charset="utf-8">
  <title>50 nuances de chat</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-image: linear-gradient(rgba(10, 8, 5, 0.221), rgba(10, 8, 5, 0.221)), url("img/background.png");
      background-size: cover;
      background-attachment: fixed;
      min-height: 100vh;
      font-family: 'Cormorant Garamond', serif;
      padding: 40px 20px 60px;
    }

    .page-div {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── TITRE ── */
    .title-block h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #f8e7c8;
      text-shadow:
        0 0 40px rgba(212, 175, 95, 0.45),
        2px 3px 0px rgba(0, 0, 0, 0.6);
      line-height: 1.1;
    }

    .title-block h1 em {
      font-style: italic;
      color: #f8cd6f;
    }

    .title-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 14px;
    }

    .title-ornament span {
      display: block;
      height: 2px;
      width: 200px;
      background: linear-gradient(90deg, transparent, #d4af5f, transparent);
    }

    .title-ornament .paw {
      font-size: 1.3rem;
      color: #d4af5f;
      animation: paw-pulse 3s ease-in-out infinite;
    }

    @keyframes paw-pulse {

      0%,
      100% {
        transform: scale(1) rotate(-5deg);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.5) rotate(5deg);
        opacity: 1;
      }
    }

    /* ── TABLEAU ── */

    tr {
            background: rgba(18, 14, 8, 0.568);

    }

    table {
      width: auto;
      margin: 0 auto;
      border: 0.5px solid rgba(212, 175, 95, 0.12);
      border-collapse: separate;
      border-spacing: 0;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(212, 175, 95, 0.3),
        0 20px 60px rgba(0, 0, 0, 0.6);
    }

    th {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #d4af5f;
      background: linear-gradient(180deg, #221d1688 0%, #382d1b94 50%, #1a12088f 100%);
      padding: 20px 24px;
      text-align: center;
      border-bottom: 2px solid rgba(212, 175, 95, 0.4);
      position: relative;
    }

    th::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: #d4af5f;
      border-radius: 2px;
    }

    /* Lignes */
    tbody tr {
      transition: background 0.3s ease, transform 0.2s ease;
    }

    tbody tr:hover {
      background: rgba(212, 175, 95, 0.10);
      transform: scale(1.005);
    }

    td {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      color: #f0e0b8;
      font-size: 1.3rem;
      padding: 18px 22px;
      text-align: center;
      vertical-align: middle;
      border: rgba(212, 175, 95, 0.12) 0.2px solid;
    }

    /*Transition*/
    #transition1 {
      background: linear-gradient(180deg, rgba(18, 14, 8, 0.568) , rgba(0, 0, 0, 0) );
      height: 40px;
      border: none;
    }
#transition1 td {
  border:none;
}
    #transition2 {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0), rgba(18, 14, 8, 0.568));
      height: 40px;
    }
#transition2 td {
  border:none;
}


    /* Colonne Date */
    td:first-child {
      font-style: italic;
      color: #c9a84c;
      font-size: 1.3rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* Colonne image */
    td img {
      border-radius: 10px;
      display: block;
      margin: 0 auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(212, 175, 95, 0.2);
      transition: box-shadow 0.3s, transform 0.3s;
    }

    td img:hover {
      transform: scale(3) translateX(-100px);
      transition-duration: 0.8s;
    }

    tr:last-of-type img:hover {
      transform: scale(3) translateX(-100px) translateY(-65px);
      transition-duration: 0.8s;
    }

    tr:first-of-type img:hover {
      transform: scale(3) translateX(-100px) translateY(65px);
      transition-duration: 0.8s;
    }

    /* iFrame map */
    td iframe {
      border-radius: 10px;
      display: block;
      margin: 0 auto;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(212, 175, 95, 0.2) !important;
    }
  </style>
</head>

<body>
  <div class="page-div">
    <div class="title-block">
      <h1>50 nuances de <em>chat</em></h1>
      <div class="title-ornament">

        </tbody>
      </table>
    </div>
