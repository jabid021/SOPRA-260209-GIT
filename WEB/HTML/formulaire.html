<!--
Champs de texte (input) => text, password,date

Zone de texte : textarea

Liste deroulante => Select / option

Choix : radio (0,1) / checkbox (0,*)

buttons => submit / reset / button



 -->
<meta charset="utf-8">

<h1>Formulaire</h1>



<form>
<fieldset>
  <legend>Bloc 1</legend>
  <table>
  <tr><td>Login : </td><td><input type="text" placeholder="Saisir votre login" value="Jaxx" name="login"></td></tr>
  <tr><td>Password :</td><td><input type="password" placeholder="Saisir votre password" name="password"></td></tr>
  <tr><td>Date :</td><td><input type="date" value="2026-01-01"></td></tr>
</table>

</fieldset>



<fieldset>
  <legend>Bloc 2</legend>
  <table>
  <tr><td>OS pref :</td>
    <td>
    <select name="osSelect">
      <option>MacOs</option>
      <option selected>Linux</option>
      <option>Windows</option>
    </select>
    </td>
  </tr>

  <tr><td>Os pref (version radio) :</td><td><input name="osRadio" type="radio">MacOS <input name="osRadio" type="radio">Linux <input name="osRadio" type="radio">Windows</td></tr>
  <tr><td>Matieres pref : </td> <td><input type="checkbox"> Java <input type="checkbox"> SQL <input type="checkbox"> JDBC</td></tr>
  <tr><td>Commentaire :</td><td><textarea rows="3" cols="20" name="commentaire" placeholder="saisir votre commentaire">Votre commentaire</textarea></td></tr>
  </table>

</fieldset>

<input type="submit" value="Modifier">
<input type="reset" value="Reset">
<!--
Login : <input type="text"><br><br>
Password : <input type="password"><br>
-->


</form>
